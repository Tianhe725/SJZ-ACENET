<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACE.NET</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  font-family:Arial;
  color:#fff;
}

.box{
  text-align:center;
}

h1{
  letter-spacing:3px;
  font-weight:normal;
}

input{
  display:block;
  margin:10px auto;
  padding:10px;
  width:220px;
  border:1px solid #555;
  background:#111;
  color:#fff;
}

button{
  width:240px;
  padding:10px;
  background:#fff;
  border:none;
  cursor:pointer;
  margin-top:10px;
}

small{
  cursor:pointer;
  display:block;
  margin-top:5px;
  color:#aaa;
}

#error{
  color:red;
  font-size:12px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="box">
  <h1>ACE.NET</h1>

  <input id="user" placeholder="USERNAME">
  
  <input id="pass" type="password" placeholder="PASSWORD">

  <small onclick="togglePass()">SHOW / HIDE PASSWORD</small>

  <button onclick="login()">ENTER</button>

  <div id="error"></div>
</div>

<script>
const USER = "ACE";
const PASS = "acefyz100725";

function togglePass(){
  const p = document.getElementById("pass");
  p.type = (p.type === "password") ? "text" : "password";
}

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === USER && p === PASS){
    window.location.href = "https://tianhe725.github.io/SJZ-ACENET/";
  }else{
    document.getElementById("error").innerText = "ACCESS DENIED";
  }
}
</script>

</body>
</html>
