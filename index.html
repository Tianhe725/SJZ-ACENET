<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJZ-ACENET Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #05070A;
    font-family: Arial, sans-serif;
    color: #EAF4FF;
}

.login-box {
    width: 320px;
    padding: 30px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,229,255,0.3);
    backdrop-filter: blur(10px);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
    letter-spacing: 2px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    background: transparent;
    border: 1px solid rgba(0,229,255,0.3);
    color: white;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #00E5FF;
    border: none;
    color: black;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

.msg {
    margin-top: 15px;
    font-size: 12px;
    color: #00E5FF;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>SJZ-ACENET</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="msg" id="msg"></div>
</div>

<script>
function login() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (u === "admin" && p === "1234") {
        document.getElementById("msg").innerText = "Login success";
    } else {
        document.getElementById("msg").innerText = "Invalid credentials";
    }
}
</script>

</body>
</html>
