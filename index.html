<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACE战队官网</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",Arial,sans-serif;
}

body{
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#0ff;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.box{
    width:360px;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(8px);
    border:1px solid rgba(0,255,255,.4);
    border-radius:12px;
    box-shadow:
        0 0 30px rgba(0,255,255,.2),
        inset 0 0 20px rgba(0,255,255,.08);
    padding:35px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:28px;
    letter-spacing:3px;
    color:#00ffff;
    text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff;
}

.input-box{
    position:relative;
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    height:45px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(0,255,255,.3);
    outline:none;
    color:#fff;
    border-radius:6px;
    padding:0 45px 0 15px;
    font-size:15px;
}

.input-box input::placeholder{
    color:#8ecfd0;
}

.eye{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    user-select:none;
    font-size:18px;
}

button{
    width:100%;
    height:45px;
    border:none;
    cursor:pointer;
    border-radius:6px;
    background:#00d9ff;
    color:#000;
    font-weight:bold;
    font-size:15px;
    transition:.3s;
}

button:hover{
    background:#00ffff;
    box-shadow:0 0 15px #00ffff;
}

#msg{
    height:22px;
    margin-top:15px;
    text-align:center;
    font-size:14px;
}

.success{
    color:#00ff88;
}

.error{
    color:#ff5555;
}

.footer{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    letter-spacing:2px;
    color:rgba(255,255,255,.65);
}

.footer .studio{
    color:#00ffff;
    text-shadow:0 0 8px #00ffff;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">

    <h1>ACE战队官网</h1>

    <div class="input-box">
        <input
            type="text"
            id="user"
            placeholder="账户名字"
            autocomplete="off">
    </div>

    <div class="input-box">

        <input
            type="password"
            id="pass"
            placeholder="密码"
            autocomplete="off">

        <span class="eye" onclick="togglePassword()">
            👁
        </span>

    </div>

    <button onclick="login()">
        ENTER
    </button>

    <div id="msg"></div>

</div>

<div class="footer">

    <span class="studio">
        天禾工作室
    </span>

    © 2026 SJZ-ACENET

</div>

<script>

const USER = "ACECYGYZH";
const PASS = "ACECYGYZHDL2026";

function togglePassword(){

    const p = document.getElementById("pass");

    if(p.type==="password"){
        p.type="text";
    }else{
        p.type="password";
    }

}

function login(){

    const u=document.getElementById("user").value;
    const p=document.getElementById("pass").value;
    const msg=document.getElementById("msg");

    if(u===USER && p===PASS){

        msg.className="success";
        msg.innerHTML="密钥正确，欢迎使用。";

        setTimeout(function(){

            window.location.href="dashboard.html";

        },1000);

    }else{

        msg.className="error";
        msg.innerHTML="密钥或账户错误，请重试。";

    }

}

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
  for(let i=0;i<160;i++){

    particles.push({

        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,

        vx:(Math.random()-0.5)*0.5,
        vy:(Math.random()-0.5)*0.5,

        r:1+Math.random()*2

    });

}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<particles.length;i++){

        let p=particles[i];

        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>canvas.width)p.vx*=-1;
        if(p.y<0||p.y>canvas.height)p.vy*=-1;

        ctx.beginPath();
        ctx.fillStyle="#00ffff";
        ctx.shadowBlur=8;
        ctx.shadowColor="#00ffff";
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

    }

    for(let i=0;i<particles.length;i++){

        for(let j=i+1;j<particles.length;j++){

            let dx=particles[i].x-particles[j].x;
            let dy=particles[i].y-particles[j].y;

            let dist=Math.sqrt(dx*dx+dy*dy);

            if(dist<150){

                ctx.beginPath();

                ctx.strokeStyle=
                "rgba(0,255,255,"+(1-dist/150)*0.6+")";

                ctx.lineWidth=1;

                ctx.moveTo(
                    particles[i].x,
                    particles[i].y
                );

                ctx.lineTo(
                    particles[j].x,
                    particles[j].y
                );

                ctx.stroke();

            }

        }

    }

    requestAnimationFrame(animate);

}

animate();

window.addEventListener("resize",function(){

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

});
  </script>

</body>
</html>
