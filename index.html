<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJZ-ACENET LOGIN</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #05070A;
    font-family: Arial, sans-serif;
    color: #EAF4FF;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    width: 320px;
    padding: 30px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,229,255,0.3);
    backdrop-filter: blur(10px);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
    letter-spacing: 2px;
    color: #00E5FF;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    background: transparent;
    border: 1px solid rgba(0,229,255,0.3);
    color: white;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #00E5FF;
    border: none;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.85;
}

.msg {
    margin-top: 12px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>SJZ-ACENET</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">LOGIN</button>

    <div class="msg" id="msg"></div>
</div>

<script>
function login() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;
    const msg = document.getElementById("msg");

    const FIXED_USER = "ACE还不出心";
    const FIXED_PASS = "acefyz100725";

    if (u === FIXED_USER && p === FIXED_PASS) {
        msg.style.color = "#00E5FF";
        msg.innerText = "ACCESS GRANTED";

        setTimeout(() => {
            document.body.innerHTML = `
                <div style="
                    height:100vh;
                    background:#05070A;
                    color:#EAF4FF;
                    display:flex;
                    flex-direction:column;
                    justify-content:center;
                    align-items:center;
                    font-family:Arial;
                ">
                    <h1 style="color:#00E5FF; letter-spacing:3px;">SJZ-ACENET</h1>
                    <p>WELCOME BACK</p>
                    <p style="color:#00E5FF;">SYSTEM UNLOCKED</p>
                </div>
            `;
        }, 800);

    } else {
        msg.style.color = "red";
        msg.innerText = "ACCESS DENIED";
    }
}
</script>

</body>
</html>
