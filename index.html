<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACE.NET</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  color:#0ff;
  overflow:hidden;
  background:#000;
}

/* 科技网格背景 */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    linear-gradient(#0ff2 1px, transparent 1px),
    linear-gradient(90deg, #0ff2 1px, transparent 1px);
  background-size:50px 50px;
  transform:rotate(15deg);
  animation:move 10s linear infinite;
  opacity:0.15;
}

@keyframes move{
  from{transform:translate(0,0) rotate(15deg);}
  to{transform:translate(-50px,-50px) rotate(15deg);}
}

/* 发光核心 */
.box{
  position:relative;
  z-index:2;
  text-align:center;
  padding:30px;
  border:1px solid #0ff4;
  box-shadow:0 0 20px #0ff3;
  backdrop-filter:blur(5px);
}

h1{
  margin-bottom:20px;
  letter-spacing:4px;
  font-weight:normal;
  text-shadow:0 0 10px #0ff;
}

input{
  display:block;
  margin:10px auto;
  padding:10px;
  width:220px;
  background:#000;
  border:1px solid #0ff5;
  color:#0ff;
  outline:none;
}

button{
  width:240px;
  padding:10px;
  margin-top:10px;
  background:#0ff;
  border:none;
  color:#000;
  cursor:pointer;
  font-weight:bold;
}

small{
  display:block;
  margin-top:5px;
  cursor:pointer;
  color:#0ff8;
}
</style>
</head>

<body>

<div class="box">
  <h1>ACE.NET</h1>

  <input id="user" placeholder="USERNAME">
  <input id="pass" type="password" placeholder="PASSWORD">

  <small onclick="togglePass()">SHOW / HIDE</small>

  <button onclick="login()">ENTER</button>
</div>

<script>
const USER = "ACE";
const PASS = "acefyz100725";

function togglePass(){
  const p = document.getElementById("pass");
  p.type = (p.type === "password") ? "text" : "password";
}

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === USER && p === PASS){
    window.location.href = "https://tianhe725.github.io/SJZ-ACENET/";
  }
}
</script>

</body>
</html>
