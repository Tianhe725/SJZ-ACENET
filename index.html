<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACE.NET LOGIN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  color:#0f0;
  font-family:Arial;
}

.box{
  width:300px;
  padding:20px;
  border:1px solid #0f0;
  text-align:center;
}

input{
  width:90%;
  margin:8px 0;
  padding:8px;
  background:#111;
  border:1px solid #0f0;
  color:#0f0;
}

button{
  width:95%;
  padding:10px;
  margin-top:10px;
  background:#0f0;
  color:#000;
  border:none;
  cursor:pointer;
}

#error{
  color:red;
  font-size:12px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="box">
  <h3>ACE.NET ACCESS</h3>

  <input id="user" placeholder="USERNAME">
  <input id="pass" type="password" placeholder="PASSWORD">

  <button onclick="login()">LOGIN</button>
  <div id="error"></div>
</div>

<script>
const USER = "ACE";
const PASS = "acefyz100725";

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === USER && p === PASS){
    window.location.href = "https://tianhe725.github.io/SJZ-ACENET/";
  }else{
    document.getElementById("error").innerText = "ACCESS DENIED";
  }
}
</script>

</body>
</html>
