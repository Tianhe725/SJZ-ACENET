<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACE.NET</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  overflow:hidden;
  font-family:Arial;
  color:#0ff;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}

.box{
  position:relative;
  z-index:2;
  text-align:center;
  padding:30px;
  border:1px solid #0ff3;
  box-shadow:0 0 25px #0ff2;
  backdrop-filter: blur(8px);
  background:rgba(0,0,0,0.35);
}

h1{
  letter-spacing:4px;
  font-weight:normal;
  text-shadow:0 0 15px #0ff;
}

.input-box{
  position:relative;
  width:240px;
  margin:10px auto;
}

input{
  width:100%;
  padding:10px;
  background:#000;
  border:1px solid #0ff6;
  color:#0ff;
  outline:none;
}

.eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

button{
  width:240px;
  padding:10px;
  margin-top:10px;
  background:#0ff;
  border:none;
  color:#000;
  cursor:pointer;
  font-weight:bold;
}

.footer{
  position:absolute;
  bottom:12px;
  width:100%;
  text-align:center;
  font-size:12px;
  color:rgba(0,255,255,0.6);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="box">
  <h1>ACE.NET</h1>

  <div class="input-box">
    <input id="user" placeholder="账户名字">
  </div>

  <div class="input-box">
    <input id="pass" type="password" placeholder="密码">
    <span class="eye" onclick="togglePass()">👁</span>
  </div>

  <button onclick="login()">ENTER</button>
</div>

<div class="footer">天禾工作室© 2026 SJZ-ACENET</div>

<script>
const USER = "ACEZSCYYQL";
const PASS = "ACECYDLMM2026";

function togglePass(){
  const p = document.getElementById("pass");
  p.type = (p.type === "password") ? "text" : "password";
}

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === USER && p === PASS){
    window.location.href = "dashboard.html";
  }
}

/* 粒子背景 */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*1.2,
    vy:(Math.random()-0.5)*1.2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#0ff";

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
